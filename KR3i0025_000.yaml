body:
  text: 煎茶水記譜録類二飲饌之屬提要臣等謹案煎茶水記一卷唐張又新撰又新字孔昭深州陸澤人司門貟外郎鷟之曽孫工部侍郎薦之子也元和九年進士第一案本傳但稱元和中及進士髙第知為九年者據此書中所𫐠知為第一者據元人所編氏族大全稱其狀元及第也厯官右補闕黨附李逢吉為八關十六子之一逢吉出為山南東道節度使以又新為行軍司馬坐田伾事貶江州刺史案新舊唐書皆云汀州刺史而書中自稱刺九江則為江州無疑以二字形近而訛也書録解題作涪州則更誤矣後又夤緣李訓遷刑部郎中為申州刺史訓死復坐貶終于左司郎中事迹具新唐書本傳其書前列刑部侍郎劉伯芻所品七水次列陸羽所品二十水云元和九年初成名時在薦福寺得於楚僧本題曰煮茶記乃代宗時湖州刺史李季卿得於陸羽口授後有葉清臣述煮茶泉品一篇歐陽修大明水記附論浮槎水記一篇考書録解題載此書已稱大明水記載卷末則宋人所附入也清臣所記稱又新此書為水經疑偶然誤記修所記極詆又新之妄謂與陸羽所説皆不合今以茶經校之信然又唐書羽本傳稱李季卿宣慰江南有薦羽者召之羽野服挈具而入季卿不為禮羽愧之更著毁茶論則羽與季卿大相齟齬又安有口授水經之理殆以羽號善茶當代所重故又新託名歟然陸遊入蜀記曰史記道餉谷簾水數器真絶品也甘腴清冷具備諸美前輩或斥水品以為不可信水品固不必盡當至谷簾泉卓然非惠山所及則亦不可誣也是遊亦有取於是書矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
