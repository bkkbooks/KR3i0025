body:
  text: 煎茶水記唐張又新撰故刑部侍郎劉公諱伯芻於又新丈人行也為學精博頗有風鑑稱較水之與茶宜者凡七等揚子江南零水第一無錫惠山寺石水第二蘇州虎丘寺石水第三丹陽縣觀音寺水第四揚州大明寺水第五吳松江水第六淮水最下第七斯七水余嘗俱瓶於舟中親挹而比之誠如其說也客有熟於兩浙者言搜訪未盡余嘗志之及刺永嘉過桐廬江至嚴子瀨溪色至清水味甚冷家人輩用陳黑壞茶潑之皆至芳香又以煎佳茶不可名其鮮馥也又愈於揚子南零殊逺及至永嘉取仙巖瀑布用之亦不下南零以是知客之說誠哉信矣夫顯理鑑物今之人信不逮於古人蓋亦有古人所未知而今人能知之者元和九年春豫初成名與同年生期於薦福寺余與李德垂先至憩西廂𤣥鑒室㑹適有楚僧至置囊有數編書余偶抽一通覽焉文細密皆雜記卷末又一題云煮茶記云代宗朝李季卿刺湖州至維揚逢陸處士鴻漸李素熟陸名有傾蓋之歡因之赴郡至揚子驛將食李曰陸君善於茶蓋天下聞名矣况揚子南零水又殊絶今日二妙千載一遇何曠之乎命軍士謹信者挈瓶操舟深詣南零陸利器以俟之俄水至陸以杓揚其水曰江則江矣非南零者似臨岸之水使曰某櫂舟深入見者纍百敢虛紿乎陸不言既而傾諸盆至半陸遽止之又以杓揚之曰自此南零者矣使蹶然大駭馳下曰某自南零齎至岸舟蕩覆半懼其鮮挹岸水增之處士之鑒神鑒也其敢隱焉李與賔從數十人皆大駭愕李因問陸既如是所經厯處之水優劣精可判矣陸曰楚水第一晉水最下李因命筆口授而次第之廬山康王谷水廉水第一無錫縣惠山寺石泉水第二蘄州蘭溪石下水第三峽州扇子山下有石突然泄水獨清冷狀如龜形俗云蝦蟇口水第四蘇州虎丘寺石泉水第五廬山招賢寺下方橋潭水第六揚子江南零水第七洪州西山西東瀑布水第八唐州柏巖縣淮水源第九淮水亦佳廬州龍池山顧水第十丹陽縣觀音寺水第十一揚州大眀寺水第十二漢江金州上游中零水第十三水苦歸州玊虛洞下香溪水第十四商州武關西洛水第十五未嘗泥吳松江水第十六天台山西南峰千丈瀑布水第十七郴州圓泉水第十八桐廬嚴陵灘水第十九雪水第二十用雪不可太冷此二十水余嘗試之非繫茶之精粗過此不之知也夫茶烹於所産處無不佳也蓋水土之宜離其處水功其半然善烹潔器全其功也李置諸笥焉遇有言茶者即示之又新刺九江有客李滂門生劉魯封言嘗見說余醒然思往嵗僧室獲是書因盡篋書在焉古人云㵼水置瓶中焉能辨淄澠此言必不可判也萬古以為信然蓋不疑矣豈知天下之理未可言至古人研精固有未盡强學君子孜孜不懈豈止思齊而已哉此言亦有禆於勸勉故記之述煮茶泉品夫渭黍汾麻泉源之異稟江橘淮枳土地之或遷誠物類之有宜亦臭味之相感也若乃擷華掇秀多識草木之名激濁揚清能辨淄澠之品斯固好事之嘉尚博識之精鑒自非嘯傲塵表逍遙林下樂追王濛之約不敗陸訥之風其孰能與於此乎吳楚山谷間氣清地靈若後頴挺多孕茶荈為人採拾大率右於武夷者為白乳甲於吳興者為紫筍産禹穴者以天章顯茂錢塘者以徑山稀至於續廬之巖雲衡之麓鴉山著於無歙濛頂𫝊於岷蜀角立差勝毛舉實繁然而天賦尤異性靡受和茍制非其妙烹失於術雖先雷而嬴未雨而檐蒸焙以圖造作以經而泉不香水不甘爨之揚之若淤若滓豫少得溫氏所著茶說嘗識其水泉之目有二十焉㑹西走巴峽經蝦蟇口北憩蕪城汲蜀岡井東遊故都絶揚子江留丹陽酌觀音泉過無錫㪺慧山水粉槍末旗蘇蘭薪桂且汲且缶以飲以啜莫不瀹氣滌慮蠲病折醒祛鄙吝之生心招神明而還觀信乎物類之得宜臭味之所感幽人之佳尚前賢之精鑒不可及已噫紫華緑英均一草也清瀾素波均一水也皆忘情於庶彚或求伸於知己不然者藂薄之莽溝瀆之流亦奚以異哉遊鹿故宫依蓮盛府一命受職再朞服勞而虛丘之觱沸松江之清泚復在封畛居然挹注是嘗所得於鴻漸之目二十而七也昔酈元善於水經而未嘗知茶王肅癖於茗飲而言不及水表是二美吾無愧焉凡泉品二十列於右幅且使盡神方之四兩遂成竒功代酒限於七升無忘真賞云爾南陽葉清臣述泉品二十見張又新水經大明水記歐陽修世𫝊陸羽茶經其論水云山水上江水次井水下又云山水乳泉石池漫流者上瀑湧湍漱勿食食久令人有頸疾江水取去人逺者井取汲多者其說最精浮槎山在愼縣南三十五里或曰浮巢二山其事出於浮圖老子之徒荒怪誕幻之說其上有泉自前世論水者皆弗道余嘗讀茶經愛陸羽善言水後得張又新水記載劉伯芻李季卿所列水次第以為得之於羽然以茶經考之皆不合又新妄狂險譎之士其言難信頗疑非羽之說及得浮槎山水然後益知羽為知水者浮槎與龍池山皆在廬州界中較其味不及浮槎逺甚而又新所記以龍池為第十浮槎之水棄而不録以此知其所失多矣羽則不然其論曰山水上江次之井為下山水乳泉石池漫流者上其言雖簡而於論水盡矣浮槎之水發自李侯嘉祐二年李侯鎮東留後出守廬州因遊金陵登蔣山飲其水又登浮槎至其山上有石池涓涓可愛蓋羽所謂乳泉漫流者也飲之則甘乃考圖記問故老得其事跡因以其水遺余於京師余報之曰李侯可謂賢矣盡窮天下之物無不得其欲者富貴之樂也至於䕃長松藉豐草聽山溜之潺湲飲石泉之滴瀝此山林者之樂也而山林之士視天下之樂不一動其心或有欲於心顧力不可得而止者乃能退而獲樂於斯彼富貴者之能致物矣而其不可兼者惟山林之樂爾惟李侯生長富貴厭於耳目又知山林之為樂至於攀緣上下幽隱窮絶人所不及者皆能得之其兼取於物者可謂多矣李侯折節好學善交賢士敏於為政所至有能名凡物不能自見而待人以彰者有矣其物未必可貴而因人以重者有矣故豫為志其事俾世知竒泉發自李侯始也煎茶水記
